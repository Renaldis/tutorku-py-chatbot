name: Deploy Chatbot TutorKu

on:
  push:
    branches: [main] # Pastikan nama branch di lokalmu benar 'main'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Kode Terbaru
        uses: actions/checkout@v4

      - name: Sinkronisasi kode ke folder server
        run: |
          # rsync lebih pintar dari cp. Dia akan menimpa yang baru dan menghapus yang sudah tidak ada
          # --exclude='.env' memastikan kalau kamu punya file .env di server, dia tidak ikut terhapus
          rsync -av --delete --exclude='.env' ./ /www/wwwroot/chatbot-tutorku/

      - name: Build dan Jalankan Docker
        run: |
          cd /www/wwwroot/chatbot-tutorku/
          # Perintah sakti untuk update dan nyalakan ulang container
          docker compose up -d --build
